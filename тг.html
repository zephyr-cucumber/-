<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="огурцы" content="СЛАВА ОГУРЦАМ">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Армия Огурцов | регистрация</title>
</head>
<body>
    <h2>🥒РЕГИСТРАЦИЯ К АРМИИ ОГУРЦОВ🥒</h2>
    
    <form id="regForm">
        <label for="ник">введи свой псевдоним</label><br>
        <input type="text" placeholder="zephyr" maxlength="20" name="ник" id="ник" required><br><br>
        
        <label>твой пароль для связи со штабом</label><br>
        <input type="password" placeholder="твой личный пароль" required><br>
        
        <input type="radio" name="огурец" value="шпион"> шпион🕵️ (повышеная опасность из-за технологий)<br>
        <input type="radio" name="огурец" value="воин"> воин⚔️ (повышенная опасность)<br>
        <input type="radio" name="огурец" value="инженер"> инженер🛠️ (пониженая опасность)<br><br>
        
        <label>кого ненавидишь больше?</label><br>
        <input type="radio" name="огурец2" value="помидоры"> помидоры🍅<br>
        <input type="radio" name="огурец2" value="красный перец"> красный перец🌶️<br><br>
        
        <button type="submit">отправить заявку📝</button>
    </form>

    <script>
        const form = document.getElementById('regForm');
        
        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const nickname = document.getElementById('ник').value;
            const password = document.querySelector('input[type="password"]').value;
            
            let role = '';
            const radiosRole = document.querySelectorAll('input[name="огурец"]');
            for (let i = 0; i < radiosRole.length; i++) {
                if (radiosRole[i].checked) {
                    role = radiosRole[i].value;
                    break;
                }
            }
            
            let hate = '';
            const radiosHate = document.querySelectorAll('input[name="огурец2"]');
            for (let i = 0; i < radiosHate.length; i++) {
                if (radiosHate[i].checked) {
                    hate = radiosHate[i].value;
                    break;
                }
            }
            
            if (!nickname || !password) {
                alert('Заполни псевдоним и пароль!');
                return;
            }
            
            const message = `🥒 НОВЫЙ РЕКРУТ! 🥒\nПозывной: ${nickname}\nПароль: ${password}\nРоль: ${role || 'не выбрана'}\nНенавидит: ${hate || 'не выбрано'}`;
            
            const token = '8757309660:AAFiAcvm-JYceYvo8UNVqXGZOK75wBez-E0';
            const chatId = '7545906461';
            const url = `https://api.telegram.org/bot${token}/sendMessage`;
            
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: message })
            });
            alert('Заявка отправлена в штаб!');
        });
    </script>
    <h1>основаная страница штаба</h1>
    <a href="https://zephyr-cucumber.github.io/-/">главная страница штаба</a>
</body>
</html>
